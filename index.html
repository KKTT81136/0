<!doctype html>
<html lang="th" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>TOS Shopping</title>
  <link rel="icon" type="image/x-icon" href="">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- 🛡️ อัปเกรดการป้องกันการทำงานผ่านคีย์บอร์ดโดยใช้ Event Listeners มาตรฐานสากล -->
  <script>
    document.addEventListener('contextmenu', event => event.preventDefault());
    document.addEventListener('keydown', function(e) {
      if(e.keyCode == 123) { e.preventDefault(); return false; }
      if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { e.preventDefault(); return false; } 
      if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { e.preventDefault(); return false; } 
      if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) { e.preventDefault(); return false; } 
      if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { e.preventDefault(); return false; } 
    });
  </script>

  <style>
    :root { 
      --color-primary: #2563eb; 
      --color-secondary: #4f46e5; 
    }
    * { 
      font-family: 'Kanit', sans-serif; 
      -webkit-font-smoothing: antialiased; 
      user-select: none; 
      -webkit-user-select: none; 
      box-sizing: border-box;
    }
    input, textarea, select { 
      user-select: auto; 
      -webkit-user-select: auto; 
      font-size: 16px !important; 
    }
    html, body { 
      min-height: 100%; 
      margin: 0; 
      background-color: #f8fafc; 
      touch-action: manipulation; 
    }
    .bg-theme-gradient { 
      background: linear-gradient(135deg, var(--color-primary), var(--color-secondary)); 
    }
    .bg-theme { 
      background-color: var(--color-primary); 
    }
    .text-theme { 
      color: var(--color-primary); 
    }
    .border-theme { 
      border-color: var(--color-primary); 
    }
    .fade-in { 
      animation: fadeIn 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
    }
    @keyframes fadeIn { 
      from { opacity: 0; transform: translateY(8px); } 
      to { opacity: 1; transform: translateY(0); } 
    }
    @keyframes dots { 
      0%, 80%, 100% { transform: scale(0); } 
      40% { transform: scale(1); } 
    }
    .dot-anim span { 
      display: inline-block; 
      width: 10px; 
      height: 10px; 
      border-radius: 50%; 
      background: var(--color-primary); 
      margin: 0 4px; 
      animation: dots 1.2s infinite ease-in-out both; 
    }
    .dot-anim span:nth-child(1) { animation-delay: -0.32s; } 
    .dot-anim span:nth-child(2) { animation-delay: -0.16s; }
    
    @keyframes slideIn { 
      from { transform: scale(0.95) translateY(10px); opacity: 0; } 
      to { transform: scale(1) translateY(0); opacity: 1; } 
    }
    .modal-anim { 
      animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
    }
    @keyframes toastSlide { 
      from { opacity: 0; transform: translate(-50%, -15px); } 
      to { opacity: 1; transform: translate(-50%, 0); } 
    }
    .toast-show { 
      animation: toastSlide 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
    }
    ::-webkit-scrollbar { 
      width: 6px; 
    }
    ::-webkit-scrollbar-track { 
      background: transparent; 
    }
    ::-webkit-scrollbar-thumb { 
      background: rgba(203, 213, 225, 0.8); 
      border-radius: 99px; 
    }
    .banner-slide { 
      transition: opacity 0.8s ease-in-out; 
    }
    .marquee-container { 
      overflow: hidden; 
      white-space: nowrap; 
      width: 100%; 
      display: block; 
      position: relative; 
    }
    .marquee-text { 
      display: inline-block; 
      padding-left: 100%; 
      animation: smoothMarquee 15s linear infinite; 
      will-change: transform; 
    }
    @keyframes smoothMarquee { 
      0% { transform: translate3d(0, 0, 0); } 
      100% { transform: translate3d(-100%, 0, 0); } 
    }
    .nav-glass { 
      background: rgba(255, 255, 255, 0.85); 
      backdrop-filter: blur(12px); 
      -webkit-backdrop-filter: blur(12px); 
    }
    .custom-bg { 
      background-size: cover; 
      background-position: center; 
      background-repeat: no-repeat;
    }
  </style>
 </head>
 <body class="h-full text-slate-800 antialiased selection:bg-blue-200">

  <!-- 📌 โครงสร้าง Pre-loader แสดงรูปภาพโลโก้โดยปราศจากข้อความ -->
  <div id="initial-loader" class="fixed inset-0 z-[9999] bg-white flex flex-col items-center justify-center transition-opacity duration-300">
    <div id="loader-logo-container" class="w-28 h-28 rounded-full overflow-hidden flex items-center justify-center bg-slate-50 border border-slate-100 p-0 shadow-sm">
      <!-- แสดงไอคอนหรือโลโก้ผ่านสคริปต์ควบคุม -->
    </div>
  </div>
  
  <div id="app" class="h-full w-full overflow-auto relative flex flex-col"></div>

  <!-- อัปเกรดมาตรฐานการทำงานผ่านสคริปต์ ES Modules ไฮไลท์หลักของระบบยุคปัจจุบัน -->
  <script type="module">
    // นำเข้าโมดูล Firebase v10+ อย่างมีประสิทธิภาพสูงสุด
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // ==========================================
    // 1. Initial Logo Pre-loader Setup
    // ==========================================
    function loadPreloaderLogo() {
      try {
        const localCached = localStorage.getItem('tos_cache_db');
        if (localCached) {
          const parsed = JSON.parse(localCached);
          const configs = parsed['configs'] || [];
          const cfg = configs.find(d => d.type === 'config');
          const container = document.getElementById('loader-logo-container');
          if (container) {
            if (cfg && cfg.logoUrl) {
              container.innerHTML = `<img src="${cfg.logoUrl}" class="w-full h-full object-cover rounded-full">`;
            } else {
              container.innerHTML = `<span class="text-5xl">🛒</span>`;
            }
          }
        } else {
          const container = document.getElementById('loader-logo-container');
          if (container) container.innerHTML = `<span class="text-5xl">🛒</span>`;
        }
      } catch (e) {
        const container = document.getElementById('loader-logo-container');
        if (container) container.innerHTML = `<span class="text-5xl">🛒</span>`;
      }
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", loadPreloaderLogo);
    } else {
      loadPreloaderLogo();
    }

    // ==========================================
    // 2. Firebase Config (Obfuscated)
    // ==========================================
    const _0xfb8 = [
      "QUl6YVN5QkpJVURtQlVib1pvRFYzd1VaMXRjYTF2dGthQXdqcHVN",
      "d2Vid2ZoLTNlY2ViLmZpcmViYXNlYXBwLmNvbQ==",
      "d2Vid2ZoLTNlY2Vi",
      "d2Vid2ZoLTNlY2ViLmZpcmViYXNlc3RvcmFnZS5hcHA=",
      "NTg0NzYwMzEzNTY=",
      "MTo1ODQ3NjAzMTM1Njp3ZWI6NDk1YmNlZmUzMmNiM2U0OTk1YzhmOQ==",
      "Ry0xU0VFMlJUNVlT"
    ];

    const firebaseConfig = {
      apiKey: atob(_0xfb8[0]),
      authDomain: atob(_0xfb8[1]),
      projectId: atob(_0xfb8[2]),
      storageBucket: _0xfb8[3] ? atob(_0xfb8[3]) : "",
      messagingSenderId: atob(_0xfb8[4]),
      appId: atob(_0xfb8[5]),
      measurementId: atob(_0xfb8[6])
    };

    const appInstance = initializeApp(firebaseConfig);
    const db = getFirestore(appInstance);

    // ==========================================
    // 3. STATE & CACHE ENGINE
    // ==========================================
    let allData = [];
    let cacheDB = {}; 
    let currentUser = null;
    let currentTab = 'home';
    let lastRenderedTab = ''; 
    let historyTab = 'orders';
    let adminTab = 'users';
    let adminUserSearch = ""; 
    let adminProductTab = '1'; 
    let adminProductPage = 1;
    const ITEMS_PER_PAGE = 10;
    let isAdmin = false;
    let bannerInterval = null;
    let isOrderProcessing = false;

    function applyTheme(primary, secondary) {
      document.documentElement.style.setProperty('--color-primary', primary || '#2563eb');
      document.documentElement.style.setProperty('--color-secondary', secondary || '#4f46e5');
    }

    function updateBrowserTab() {
      document.title = getTabTitle();
      const favUrl = getTabFavicon();
      if (favUrl) {
        let link = document.querySelector("link[rel~='icon']");
        if (!link) {
          link = document.createElement('link');
          link.rel = 'icon';
          document.head.appendChild(link);
        }
        link.href = favUrl;
      }
    }

    try {
      const localCached = localStorage.getItem('tos_cache_db');
      if (localCached) {
        cacheDB = JSON.parse(localCached);
        allData = Object.values(cacheDB).flat();
        
        const cachedCfg = allData.find(d => d.type === 'config');
        if (cachedCfg) {
          applyTheme(cachedCfg.themePrimary, cachedCfg.themeSecondary);
          setTimeout(() => { updateBrowserTab(); }, 50);
        }
      }
    } catch (e) {
      console.warn("ไม่สามารถเรียกคืนข้อมูลแคชออฟไลน์ได้:", e);
    }

    const $ = id => document.getElementById(id);
    const getUsers = () => allData.filter(d => d.type === 'user');
    const getProducts = () => allData.filter(d => d.type === 'product').sort((a,b) => parseInt(a.productOrder||0) - parseInt(b.productOrder||0));
    const getSpecialTemplates = () => allData.filter(d => d.type === 'special_template');
    const getSpecialAssignments = () => allData.filter(d => d.type === 'special_assign').sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
    const getOrders = () => allData.filter(d => d.type === 'order');
    const getWithdrawals = () => allData.filter(d => d.type === 'withdrawal');
    const getBanners = () => allData.filter(d => d.type === 'banner');
    const getGallery = () => allData.filter(d => d.type === 'gallery');
    const getMenuIcons = () => allData.filter(d => d.type === 'menuIcon').sort((a,b) => parseInt(a.menuOrder||0) - parseInt(b.menuOrder||0));

    const getUserOrders = (uid) => getOrders().filter(o => o.userId === uid);
    const getUserWithdrawals = (uid) => getWithdrawals().filter(w => w.userId === uid);
    const getConfig = () => allData.find(d => d.type === 'config') || null;

    const getAdminPin = () => { const c = getConfig(); return c && c.adminPin ? String(c.adminPin).trim() : 'admin123'; };
    const getInviteCode = () => { const c = getConfig(); return c && c.inviteCode ? String(c.inviteCode).trim() : '12345'; };
    const getLogoUrl = () => { const c = getConfig(); return c && c.logoUrl ? c.logoUrl : ''; };
    const getLoginBgUrl = () => { const c = getConfig(); return c && c.loginBgUrl ? c.loginBgUrl : ''; };
    const getUserBgUrl = () => { const c = getConfig(); return c && c.userBgUrl ? c.userBgUrl : ''; };
    const getMarqueeText = () => { const c = getConfig(); return c && c.marqueeText ? c.marqueeText : 'ยินดีต้อนรับสู่ระบบ TOS Shopping รับรายได้พิเศษทุกวัน'; };
    const getLineQrUrl = () => { const c = getConfig(); return c && c.lineQrUrl ? c.lineQrUrl : ''; };
    const getLineId = () => { const c = getConfig(); return c && c.lineId ? c.lineId : ''; };
    const getTopupQrUrl = () => { const c = getConfig(); return c && c.topupQrUrl ? c.topupQrUrl : ''; };
    const getTopupAccount = () => { const c = getConfig(); return c && c.topupAccount ? c.topupAccount : ''; };
    const getTabTitle = () => { const c = getConfig(); return c && c.tabTitle ? c.tabTitle : 'TOS Shopping'; };
    const getTabFavicon = () => { const c = getConfig(); return c && c.tabFaviconUrl ? c.tabFaviconUrl : ''; };

    // 🚀 อัปเกรดมาตรฐานการสร้างรหัส UUIDv4 แบบสากลป้องกันการซ้ำของข้อมูลแบบเด็ดขาด
    function genId() {
      if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
        return crypto.randomUUID();
      }
      return Date.now().toString(36) + Math.random().toString(36).slice(2,8);
    }

    function showToast(msg, type='success') {
      const old = $('toast-container'); if (old) old.remove();
      const colors = { 
        success:'bg-emerald-600 border-emerald-700 text-white', 
        error:'bg-red-600 border-red-700 text-white', 
        info:'bg-blue-600 border-blue-700 text-white' 
      };
      const icons = { success:'check-circle', error:'alert-circle', info:'info' };
      const div = document.createElement('div');
      div.id = 'toast-container';
      div.className = 'fixed top-6 left-1/2 -translate-x-1/2 z-[9999] toast-show w-max max-w-[90vw]';
      div.innerHTML = `
        <div class="${colors[type]} px-6 py-3.5 rounded-2xl shadow-lg border flex items-center gap-3 text-sm font-bold tracking-wide">
          <i data-lucide="${icons[type]}" class="w-5 h-5 flex-shrink-0 text-white"></i>
          <span class="text-white">${msg}</span>
        </div>`;
      document.body.appendChild(div);
      lucide.createIcons();
      setTimeout(() => { if(div) div.remove(); }, 2500);
    }

    function showModal(content) {
      let m = $('modal-overlay');
      if (!m) { 
        m = document.createElement('div'); m.id = 'modal-overlay'; 
        m.addEventListener('click', function(e) { if (e.target === m) closeModal(); });
        document.body.appendChild(m); 
      }
      m.className = 'fixed inset-0 bg-black/75 z-[100] flex items-center justify-center p-4 cursor-pointer';
      m.innerHTML = `
        <div class="bg-white rounded-[24px] p-6 w-full max-w-sm modal-anim shadow-xl border border-slate-200 max-h-[90vh] overflow-y-auto cursor-auto text-slate-900" onclick="event.stopPropagation()">
          ${content}
        </div>`;
      lucide.createIcons();
    }
    function closeModal() { const m = $('modal-overlay'); if (m) m.remove(); isOrderProcessing = false; }

    // ==========================================
    // 4. Firestore CRUD Engine (อัปเกรดมาตรฐานการทำงาน Firebase Modular v10+)
    // ==========================================
    const getCol = (type) => {
      const map = { 
        user: 'users', order: 'orders', product: 'products', withdrawal: 'withdrawals', 
        config: 'configs', banner: 'banners', gallery: 'galleries', menuIcon: 'menu_icons', 
        special_template: 'special_templates', special_assign: 'special_assignments' 
      };
      return map[type] || 'misc';
    };

    const windowDataSdk = {
      create: function(obj) {
        if(!obj.id) obj.id = genId();
        obj.__backendId = obj.id;
        const col = getCol(obj.type);
        setDoc(doc(db, col, obj.id), obj).catch(console.error);
        return {isOk: true};
      },
      update: function(obj) {
        const backendId = obj.__backendId || obj.id;
        const col = getCol(obj.type);
        setDoc(doc(db, col, backendId), obj).catch(console.error);
        return {isOk: true};
      },
      delete: function(obj) {
        const col = getCol(obj.type);
        deleteDoc(doc(db, col, obj.__backendId || obj.id)).catch(console.error);
        return {isOk: true};
      }
    };

    function updateAdminWdBadge() {
      const badge = $('wd-badge');
      const pendingCount = getWithdrawals().filter(w => w.status === 'pending').length;
      if(badge) {
        if(pendingCount > 0) { badge.innerText = pendingCount; badge.classList.remove('hidden'); } 
        else { badge.classList.add('hidden'); }
      }
    }

    function refreshUI() {
      if (currentUser) {
        const freshUser = getUsers().find(u => u.id === currentUser.id);
        if (freshUser) currentUser = freshUser;
        if ($('dash-content')) renderTabContent(); 
      } else if (isAdmin) {
        updateAdminWdBadge(); 
        if (['users', 'withdrawals', 'products', 'special', 'media', 'settings'].includes(adminTab)) {
          if($('admin-content')) renderAdminTab();
        }
      }
    }

    let loadStatus = {};
    const collectionsToListen = ['users', 'orders', 'products', 'withdrawals', 'configs', 'banners', 'galleries', 'menu_icons', 'special_templates', 'special_assignments'];

    function triggerAppStart() {
      const essentialLoaded = loadStatus['users'] && loadStatus['configs'];
      const allLoaded = Object.values(loadStatus).every(s => s === true);
      
      if ((allLoaded || essentialLoaded || window.appCacheLoaded) && !window.appStarted) {
        window.appStarted = true;
        const loader = $('initial-loader'); 
        if (loader) { 
          loader.style.opacity = '0'; 
          setTimeout(() => loader.remove(), 400); 
        }
        checkLoginState();
      }
    }

    function initApp() {
      setTimeout(() => {
        if (!window.appStarted) {
          window.appCacheLoaded = true;
          triggerAppStart();
        }
      }, 1500);

      collectionsToListen.forEach(col => {
        loadStatus[col] = false;
        onSnapshot(collection(db, col), (snapshot) => {
          let colData = [];
          snapshot.forEach(docSnap => colData.push({ ...docSnap.data(), __backendId: docSnap.id }));
          cacheDB[col] = colData;
          allData = Object.values(cacheDB).flat();
          
          try {
            localStorage.setItem('tos_cache_db', JSON.stringify(cacheDB));
          } catch(e) {}

          loadStatus[col] = true;
          
          if (col === 'configs') {
            const cfg = getConfig();
            if (cfg) {
              applyTheme(cfg.themePrimary, cfg.themeSecondary);
              updateBrowserTab();
            }
          }

          if (col === 'users' && !currentUser && localStorage.getItem('tos_user')) {
            checkLoginState();
          }

          triggerAppStart();
          refreshUI();
        }, error => {
          console.warn(`ล้มเหลวในการเชื่อมต่อสดสำหรับตาราง: ${col}`, error);
          loadStatus[col] = true;
          triggerAppStart();
        });
      });
    }

    function checkLoginState() {
      const savedUser = localStorage.getItem('tos_user');
      const isAdminSession = sessionStorage.getItem('tos_admin_session');

      if (isAdminSession === 'true') { 
        isAdmin = true; adminTab = sessionStorage.getItem('tos_admin_tab') || 'users'; 
        renderAdmin();
      } else if (savedUser) {
        try {
          const creds = JSON.parse(savedUser);
          const validUser = getUsers().find(u => String(u.phone) === String(creds.phone) && String(u.password) === String(creds.password));
          if(validUser) { 
            currentUser = validUser; 
            currentTab = sessionStorage.getItem('tos_current_tab') || 'home'; 
            renderDashboard();
          } else { 
            if (!loadStatus['users'] && !window.appCacheLoaded) {
              console.log("กำลังรอการตอบรับข้อมูลผู้ใช้งานจริงจากโฮสต์...");
            } else {
              renderLogin(); 
            }
          }
        } catch(e) { renderLogin(); }
      } else {
        renderLogin();
      }

      const cfg = getConfig(); 
      if(cfg) {
        applyTheme(cfg.themePrimary, cfg.themeSecondary);
        updateBrowserTab();
      }
    }

    initApp();

    // ==========================================
    // 5. Login / Register 
    // ==========================================
    function getLogoHtml() {
      const logoUrl = getLogoUrl();
      return logoUrl ? `<img src="${logoUrl}" class="w-full h-full object-cover rounded-full">` : `<span class="text-5xl text-gray-800">🛒</span>`;
    }

    function renderLogin() {
      const app = $('app');
      const bgUrl = getLoginBgUrl();
      const bgStyle = bgUrl ? `background-image: url('${bgUrl}'); background-size: cover; background-position: center;` : '';

      app.innerHTML = `
      <div class="min-h-full w-full flex flex-col items-center justify-center p-4 relative ${bgUrl ? '' : 'bg-theme-gradient'}" style="${bgStyle}">
        ${bgUrl ? '<div class="absolute inset-0 bg-slate-950/50 backdrop-blur-[2px]"></div>' : ''}
        <div class="w-full max-w-sm relative z-10 py-4">
          <div class="text-center mb-6">
            <div id="logo-click" class="inline-flex items-center justify-center w-32 h-32 rounded-full shadow-2xl cursor-pointer overflow-hidden transition-all duration-300 bg-transparent p-0">
              ${getLogoHtml()}
            </div>
          </div>
          <div id="form-card" class="bg-white/10 backdrop-blur-lg rounded-[32px] p-6 shadow-2xl border border-white/20 transition-all duration-300">
            <div id="form-content"></div>
          </div>
          <p class="text-center mt-6 text-white/95 text-sm font-medium" id="toggle-link"></p>
        </div>
      </div>`;
      showLoginForm();
      
      let clickCount = 0; let clickTimer;
      $('logo-click').onclick = () => {
        clickCount++; clearTimeout(clickTimer);
        clickTimer = setTimeout(() => clickCount = 0, 2000);
        if (clickCount >= 5) { clickCount = 0; showAdminLogin(); }
      };
      lucide.createIcons();
    }

    function showLoginForm() {
      const logoBtn = $('logo-click'); 
      if(logoBtn) { logoBtn.className = "inline-flex items-center justify-center w-32 h-32 rounded-full shadow-2xl cursor-pointer overflow-hidden transition-all duration-300 bg-transparent p-0"; }
      $('form-content').innerHTML = `
        <h2 class="text-white font-bold text-xl mb-6 text-center tracking-wide">เข้าสู่ระบบ</h2>
        <div class="space-y-4">
          <div class="space-y-1">
            <input id="inp-phone-login" type="tel" class="w-full px-4 py-3.5 rounded-2xl bg-white/15 text-white placeholder-white/60 outline-none focus:bg-white/25 transition font-medium text-base border border-white/10 focus:border-white/40 focus:ring-2 focus:ring-white/20" placeholder="เบอร์โทรศัพท์ 10 หลัก">
          </div>
          <div class="space-y-1">
            <input id="inp-pass-login" type="password" class="w-full px-4 py-3.5 rounded-2xl bg-white/15 text-white placeholder-white/60 outline-none focus:bg-white/25 transition font-medium text-base border border-white/10 focus:border-white/40 focus:ring-2 focus:ring-white/20" placeholder="รหัสผ่าน">
          </div>
          <button onclick="doLogin()" id="btn-login" class="w-full py-3.5 mt-2 bg-white text-theme font-bold rounded-2xl shadow-xl hover:bg-slate-50 active:scale-[0.98] transition text-base tracking-wide">ลงชื่อเข้าใช้</button>
        </div>`;
      $('toggle-link').innerHTML = `ยังไม่มีบัญชี? <a href="#" onclick="showRegisterForm(); return false" class="underline font-bold text-white hover:text-slate-100">สมัครสมาชิกที่นี่</a>`;
    }

    function showRegisterForm() {

    function startBannerSlide() {
      clearInterval(bannerInterval); const slides = document.querySelectorAll('.banner-slide');
      if (slides.length > 1) { 
        let idx = 0; 
        bannerInterval = setInterval(() => { 
          const activeSlides = document.querySelectorAll('.banner-slide'); 
          if(!activeSlides.length) return; 
          if(activeSlides[idx]) activeSlides[idx].style.opacity = 0; 
          idx = (idx + 1) % activeSlides.length; 
          if(activeSlides[idx]) activeSlides[idx].style.opacity = 1; 
        }, 4000); 
      }
    }

    function processOrderFlowStep1(p, isSpecial, btnElement) {

        processOrderFlowStep2(pId, isSpecial);

    function processOrderFlowStep2(productIdOrObj, isSpecial) {
      const u = currentUser; let p = typeof productIdOrObj === 'object' ? productIdOrObj : allData.find(d => d.__backendId === productIdOrObj); if(!p) return;
      const isSpecialMode = (isSpecial === true || String(isSpecial) === 'true');

    function renderPagination(totalItems, currentPage, onChangeFnStr) {
      const totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE); if(totalPages <= 1) return '';
      let html = '<div class="flex justify-center gap-1.5 mt-6 mb-2">';
      html += `<button onclick="${onChangeFnStr}(${currentPage - 1})" class="px-3 py-1.5 bg-slate-800 text-slate-300 rounded-lg text-xs font-bold disabled:opacity-30 hover:bg-slate-700" ${currentPage === 1 ? 'disabled' : ''}>Prev</button>`;
      let start = Math.max(1, currentPage - 2); let end = Math.min(totalPages, start + 4); start = Math.max(1, end - 4);
      for(let i = start; i <= end; i++) html += `<button onclick="${onChangeFnStr}(${i})" class="px-3.5 py-1.5 rounded-lg text-xs font-bold transition-all ${currentPage === i ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'}">${i}</button>`;
      html += `<button onclick="${onChangeFnStr}(${currentPage + 1})" class="px-3 py-1.5 bg-slate-800 text-slate-300 rounded-lg text-xs font-bold disabled:opacity-30 hover:bg-slate-700" ${currentPage === totalPages ? 'disabled' : ''}>Next</button></div>`;
      return html;
    }

    function deleteUserOrder(orderBid) {
      const order = allData.find(d => d.__backendId === orderBid); if(!order) return;
      const user = getUsers().find(u => u.id === order.userId); if(!user) return;
      if(!confirm('ต้องการลบสินค้านี้ใช่หรือไม่? ระบบจะหักค่าคอมมิชชันออกจากผู้ใช้นี้')) return;
      let ded = 0; if (order.status === 'completed') { ded += (order.commission || 0); if (order.isSpecial === true || String(order.isSpecial) === 'true') ded += (order.productPrice || 0); }
      user.credit = Math.max(0, (user.credit || 0) - ded); user.runIndex = Math.max(0, (user.runIndex || 0) - 1);
      windowDataSdk.update(user); windowDataSdk.delete(order); closeModal(); showToast('ลบประวัติคำสั่งซื้อสำเร็จ'); setTimeout(() => viewAdminUserHistory(user.id, user.username), 10);
    }

    function resetUserOrders(uid) {
      const user = getUsers().find(u => u.id === uid); const orders = getUserOrders(uid);
      if(!confirm('คำเตือน! คุณต้องการรีเซ็ตข้อมูลทั้งหมดจริง ๆ ใช่ไหม?')) return;
      let ded = 0; orders.forEach(o => { if (o.status === 'completed') { ded += (o.commission || 0); if (o.isSpecial === true || String(o.isSpecial) === 'true') ded += (o.productPrice || 0); }});
